<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Device Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      body {
        background: linear-gradient(135deg, #8866ff, whitesmoke);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial;
      }

      /* LOGIN CARD */
      .login-card {
        width: 380px;
        border: 1px solid blue;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      /* HEADER */
      .login-header {
        background: #0b3d91;
        color: white;
        text-align: center;
        padding: 25px;
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
      }

      .login-header i {
        font-size: 40px;
      }

      /* INPUT */
      .form-control {
        padding-left: 40px;
      }

      .input-icon {
        position: absolute;
        margin-top: 10px;
        margin-left: 12px;
        color: #0b3d91;
      }

      /* BUTTON */
      .login-btn {
        background: #0b3d91;
        border: none;
      }

      .login-btn:hover {
        background: #072d6b;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        font-size: 13px;
        margin-top: 10px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card login-card">
      <div class="login-header">
        <i class="fa fa-server"></i>
        <h4 class="mt-2">Device Manager</h4>
      </div>
      <div class="card-body p-4">
        <form action="dashboard.html">
          <div class="mb-3 position-relative">
            <i class="fa fa-user input-icon"></i>
            <input type="text" class="form-control" placeholder="Username">
          </div>
          <div class="mb-3 position-relative">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" class="form-control" placeholder="Password">
          </div>
          <div class="d-grid">
            <button class="btn btn-primary login-btn">
              <i class="fa fa-sign-in"></i> Login </button>
          </div>
        </form>
        <div class="footer mt-3"> Device Monitoring System </div>
      </div>
    </div>
  </body>
</html>
