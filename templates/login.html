{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Device Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      body {
        background: linear-gradient(135deg, #8866ff, whitesmoke);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial;
      }

      /* LOGIN CARD */
      .login-card {
        width: 380px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        overflow: hidden;
      }

      /* HEADER IMAGE */
      .login-header img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
      }

      /* INPUT */
      .form-control {
        padding-left: 40px;
      }

      .input-icon {
        position: absolute;
        margin-top: 10px;
        margin-left: 12px;
        color: #0b3d91;
      }

      /* BUTTON */
      .login-btn {
        background: #0b3d91;
        border: none;
      }

      .login-btn:hover {
        background: #072d6b;
      }

      /* FOOTER */
      .footer {
        text-align: center;
        font-size: 13px;
        margin-top: 10px;
        color: #777;
      }

      /* ALERT */
      .alert-top-right {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2000;
        width: 400px;
      }
    </style>
  </head>
  <body>
    <!-- MESSAGE --> {% if messages %} {% for message in messages %} <div class="alert alert-info alert-dismissible fade show shadow-sm alert-top-right">
      <i class="fa fa-info-circle"></i>
      <strong>Informasi:</strong> {{message}}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div> {% endfor %} {% endif %} <div class="card login-card">
      <!-- HEADER IMAGE -->
      <div class="login-header d-flex justify-content-center">
        <img src="{% static 'images/logo.png' %}" style="width: 300px;">
      </div>
      <div class="card-body p-4">
        <form method="POST"> {% csrf_token %} <div class="mb-3 position-relative">
            <i class="fa fa-user input-icon"></i>
            <input type="text" class="form-control" placeholder="Username" name="username">
          </div>
          <div class="mb-3 position-relative">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" class="form-control" placeholder="Password" name="password">
          </div>
          <div class="d-grid">
            <button class="btn btn-primary login-btn">
              <i class="fa fa-sign-in"></i> Login </button>
          </div>
        </form>
        <div class="footer mt-3"> Device Monitoring System </div>
      </div>
    </div>
  </body>
</html>
