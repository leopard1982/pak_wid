{% extends 'base.html'%}
{% block header %}
    <style>
      body {
        background: #eef2f7;
        font-family: Arial;
      }

      /* SIDEBAR */
      .sidebar {
        height: 100vh;
        width: 260px;
        position: fixed;
        background: #0b3d91;
        color: white;
        transition: 0.3s;
        overflow-y: auto;
        z-index: 1050;
        box-shadow: 4px 0px 20px rgba(0, 0, 0, 0.25);
      }

      .sidebar-header {
        padding: 25px 20px;
        background: #072d6b;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }

      .sidebar-title {
        padding: 12px 20px;
        font-size: 12px;
        letter-spacing: 1px;
        opacity: 0.7;
      }

      .sidebar a {
        display: block;
        color: white;
        padding: 13px 20px;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #072d6b;
      }

      .sidebar i {
        width: 22px;
      }

      /* MAIN */
      .main {
        margin-left: 260px;
        padding: 20px;
      }

      /* TOPBAR */
      .topbar {
        background: white;
        padding: 12px 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* FORM CARD */
      .form-card {
        border: none;
        border-radius: 12px;
      }

      .form-label {
        font-weight: bold;
      }

      .btn-primary {
        background: #0b3d91;
        border: none;
      }

      .btn-primary:hover {
        background: #072d6b;
      }

      /* MOBILE */
      @media(max-width:768px) {
        .sidebar {
          left: -260px;
        }

        .sidebar.active {
          left: 0;
        }

        .main {
          margin-left: 0;
        }
      }
    </style>
{% endblock %}
{% block contents %}
      <!-- FORM -->
      <div class="card form-card shadow-sm">
        <div class="card-header">
          <h6 class="mb-0">
            <i class="fa fa-user"></i> User Information
          </h6>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="row">
              <div class="col-12 mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="Enter username">
              </div>              
            </div>
            <div class="mb-3">
              <label class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" placeholder="Nama lengkap">
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-control">
                <option value="super">Super</option>
                <option value="admin">Admin</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
            <div class="mt-4">
              <button class="btn btn-primary">
                <i class="fa fa-save"></i> Save User </button>
              <button type="reset" class="btn btn-secondary">
                <i class="fa fa-refresh"></i> Reset </button>
            </div>
          </form>
        </div>
      </div>
{% endblock %}
