{% extends 'base.html'%}

{% block header %}
<style>

  body {
    background: #eef2f7;
    font-family: Arial;
  }

  /* SIDEBAR */
  .sidebar {
    height: 100vh;
    width: 260px;
    position: fixed;
    background: #0b3d91;
    color: white;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 1050;
    box-shadow: 4px 0px 20px rgba(0,0,0,0.25);
  }

  .sidebar-header {
    padding:25px 20px;
    background:#072d6b;
    text-align:center;
  }

  .sidebar a{
    display:block;
    color:white;
    padding:13px 20px;
    text-decoration:none;
  }

  .sidebar a:hover{
    background:#072d6b;
  }

  /* MAIN */
  .main{
    margin-left:260px;
    padding:20px;
  }

  /* CARD */
  .form-card{
    border:none;
    border-radius:12px;
  }

  .form-label{
    font-weight:bold;
  }

  .btn-primary{
    background:#0b3d91;
    border:none;
  }

  .btn-primary:hover{
    background:#072d6b;
  }

  /* MOBILE */
  @media(max-width:768px){
    .sidebar{
      left:-260px;
    }

    .sidebar.active{
      left:0;
    }

    .main{
      margin-left:0;
    }
  }

</style>
{% endblock %}



{% block contents %}

<div class="card form-card shadow-sm">

  <div class="card-header">

    <h6 class="mb-0">
      <i class="fa fa-edit"></i> Edit User
    </h6>

  </div>


  <div class="card-body">

    <form method="POST" action="{% url 'edit_pengguna' usernya.id%}">
      {% csrf_token %}

      <div class="row">

        <div class="col-12 mb-3">

          <label class="form-label">Username</label>

          <input 
            type="text"
            name="user"
            class="form-control"
            value="{{ usernya.username }}"
            readonly
          >

        </div>

      </div>


      <div class="mb-3">

        <label class="form-label">Nama Lengkap</label>

        <input 
          type="text"
          name="nama"
          class="form-control"
          value="{{ usernya.userprofile.nama_lengkap}}"
          required
        >

      </div>



      <div class="mb-3">

        <label class="form-label">Role</label>

        <select class="form-control" name="role">

          <option value="super"
          {% if usernya.userprofile.role == "super" %}selected{% endif %}>
          Super
          </option>

          <option value="admin"
          {% if usernya.userprofile.role == "admin" %}selected{% endif %}>
          Admin
          </option>

          <option value="viewer"
          {% if usernya.userprofile.role == "viewer" %}selected{% endif %}>
          Viewer
          </option>

        </select>

      </div>



      <div class="mb-3">
        <label class="form-label">Status Akun</label>
        <div class="d-flex gap-3 mt-1">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="is_active" id="statusAktif" value="true" {% if usernya.is_active %}checked{% endif %}>
            <label class="form-check-label text-success fw-semibold" for="statusAktif">
              <i class="fa fa-check-circle"></i> Aktif
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="is_active" id="statusNonaktif" value="false" {% if not usernya.is_active %}checked{% endif %}>
            <label class="form-check-label text-danger fw-semibold" for="statusNonaktif">
              <i class="fa fa-ban"></i> Nonaktif
            </label>
          </div>
        </div>
      </div>

      <div class="mt-4">

        <button type="submit" class="btn btn-primary">
          <i class="fa fa-save"></i> Update User
        </button>

        <a href="/user/list/" class="btn btn-secondary">
          <i class="fa fa-arrow-left"></i> Back
        </a>

      </div>

    </form>

  </div>

</div>

{% endblock %}
